services:
  - type: web
    name: ai-memory-os-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      # Supabase
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false

      # OpenRouter LLM
      - key: LLM_PROVIDER
        value: custom
      - key: LLM_ENDPOINT
        value: https://openrouter.ai/api/v1
      - key: LLM_API_KEY
        sync: false
      - key: LLM_MODEL
        value: google/gemini-2.5-flash

      # Embeddings
      - key: EMBEDDING_PROVIDER
        value: custom
      - key: EMBEDDING_ENDPOINT
        value: https://openrouter.ai/api/v1
      - key: EMBEDDING_API_KEY
        sync: false
      - key: EMBEDDING_MODEL
        value: openai/text-embedding-3-small
      - key: EMBEDDING_DIMENSIONS
        value: "1536"

      # Cognee storage paths (use /tmp on Render - ephemeral disk)
      - key: SYSTEM_ROOT_DIRECTORY
        value: /tmp/cognee_system
      - key: DATA_ROOT_DIRECTORY
        value: /tmp/cognee_system/data

      # Disable Cognee backend access control for hackathon
      - key: ENABLE_BACKEND_ACCESS_CONTROL
        value: "false"
